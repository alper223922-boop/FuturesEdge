name: APK Kesin Cozum
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17 Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 8.2 Kur
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2  # Hata veren 9.4 yerine daha stabil olan 8.2'yi zorluyoruz

      - name: APK Derle
        run: |
          # Eski hatalı dosyaları temizle
          rm -f gradlew gradlew.bat
          # Derlemeyi başlat
          gradle assembleDebug --no-daemon

      - name: APK Yukle
        uses: actions/upload-artifact@v4
        with:
          name: FuturesEdge-APK
          path: app/build/outputs/apk/debug/*.apk
