name: APK Kesin Cozum
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17 Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Sifirla ve Derle
        run: |
          # Bozuk dosyalari temizle
          rm -f gradlew gradlew.bat
          rm -rf gradle/wrapper
          
          # Gradle 8.2.2'yi zorla kur (Link vererek)
          gradle wrapper --gradle-distribution-url https://services.gradle.org/distributions/gradle-8.2.2-bin.zip
          
          # Calistirma izni ver
          chmod +x gradlew
          
          # APK'yi basalim
          ./gradlew assembleDebug

      - name: APK'yi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: FuturesEdge-APK
          path: app/build/outputs/apk/debug/*.apk
