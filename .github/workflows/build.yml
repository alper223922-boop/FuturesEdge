name: APK Kesin Cozum
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17 Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dogrudan Derle
        run: |
          # Hata veren tum wrapper dosyalarini silelim
          rm -f gradlew gradlew.bat
          rm -rf gradle/wrapper
          
          # GitHub'da yuklu olan ana gradle komutuyla derleyelim
          gradle assembleDebug

      - name: APK'yi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: FuturesEdge-APK
          path: app/build/outputs/apk/debug/*.apk
