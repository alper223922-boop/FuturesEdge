name: APK Kesin Cozum
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17 Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Kur ve Derle
        uses: gradle/actions/setup-gradle@v3
        # Sürümü boş bırakıyoruz, GitHub kendisi en uygununu seçecek

      - name: APK Derle
        run: |
          # Eğer proje içinde eski gradle dosyaları kalmışsa onları silelim ki çakışmasın
          rm -f gradlew gradlew.bat
          gradle assembleDebug

      - name: APK Yukle
        uses: actions/upload-artifact@v4
        with:
          name: FuturesEdge-APK
          path: app/build/outputs/apk/debug/*.apk
